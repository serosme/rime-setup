on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple

  build:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: iDvel/rime-ice
          path: upstream-repo
          fetch-depth: 1

      - uses: actions/checkout@v4
        with:
          path: local-repo
          fetch-depth: 1

      - run: |
          mkdir -p merged
          cp -r upstream-repo/* merged/
          cp -r local-repo/* merged/

      - run: |
          cd merged
          zip -r "../rime-config-${{ needs.release-please.outputs.tag_name }}.zip" .

      - name: Upload release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "rime-config-${{ needs.release-please.outputs.tag_name }}.zip" \
            --repo "${{ github.repository }}"
